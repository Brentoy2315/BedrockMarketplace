<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Bedrock Marketplace — Dark Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            color: #eef2ff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #1e293b;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .admin-btn {
            background-color: #334155;
            color: #f1f5f9;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-btn:hover {
            background-color: #475569;
            transform: translateY(-1px);
        }

        /* Filter Bar */
        .filter-bar {
            background: #0f172a;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #1e293b;
        }

        .search-box {
            width: 100%;
            padding: 12px 18px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 48px;
            font-size: 1rem;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }

        .search-box:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .filter-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-right: 5px;
        }

        .filter-chip {
            background: #1e293b;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #cbd5e6;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .filter-chip.active {
            background: #3b82f6;
            color: white;
        }

        .filter-chip:hover:not(.active) {
            background: #334155;
        }

        .clear-filters {
            background: transparent;
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .clear-filters:hover {
            background: #ef4444;
            color: white;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            background: #0f172a;
            padding: 2rem;
            border-radius: 28px;
            margin-bottom: 2.5rem;
            border: 1px solid #1e293b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-group input {
            padding: 12px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 16px;
            font-size: 0.95rem;
            color: #f1f5f9;
        }

        .form-group input:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .logout-btn {
            background: #475569;
            margin-left: 15px;
        }

        /* Catalog Display */
        .category-section {
            margin-bottom: 2.5rem;
        }

        .category-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            border-left: 5px solid #60a5fa;
            padding-left: 15px;
            color: #e2e8f0;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
        }

        .item-card {
            background: #111827;
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #1e293b;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px black;
        }

        .item-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #1e293b;
        }

        .item-info {
            padding: 1rem;
        }

        .item-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
        }

        .item-category {
            font-size: 0.8rem;
            color: #93c5fd;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .item-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .item-link:hover {
            background: #2563eb;
        }

        .delete-item {
            float: right;
            background: none;
            border: none;
            color: #f87171;
            font-size: 1.3rem;
            cursor: pointer;
            display: none;
        }

        .admin-mode .delete-item {
            display: inline-block;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
            background: #0f172a;
            border-radius: 28px;
            margin-top: 1rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
            .site-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="site-header">
        <div class="logo">ᴍɪɴᴇᴄʀᴀꜰᴛ ʙᴇᴅʀᴏᴄᴋ ᴍᴀʀᴋᴇᴛᴘʟᴀᴄᴇ</div>
        <button id="adminLoginBtn" class="admin-btn">🔐 Admin Login</button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by title...">
        <div class="category-filters">
            <span class="filter-label">Filter by category:</span>
            <div id="categoryChips"></div>
            <button id="clearFiltersBtn" class="clear-filters">Clear all filters</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminPanel" class="admin-dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:#e2e8f0;">➕ Admin Controls</h2>
            <button id="logoutBtn" class="admin-btn logout-btn">🚪 Logout</button>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Image URL (Photo):</label>
                <input type="text" id="itemImage" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Title:</label>
                <input type="text" id="itemTitle" placeholder="e.g., Dragon Slayer Pack">
            </div>
            <div class="form-group">
                <label>Category:</label>
                <input type="text" id="itemCategory" placeholder="e.g., Addons / Worlds">
            </div>
            <div class="form-group">
                <label>Download Link URL:</label>
                <input type="text" id="itemLink" placeholder="https://...">
            </div>
        </div>
        <button id="addItemBtn" class="btn-primary">➕ Add New Item</button>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #94a3b8;">⚡ Tip: Click the 'X' on any card below to delete it (visible only in admin mode)</p>
    </div>

    <!-- Catalog Container -->
    <div id="catalogContainer"></div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔒 Admin Access Only</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button id="submitLogin">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<script>
    // Admin Credentials
    const ADMIN_CRED = {
        username: "Brentoyyy2315",
        password: "@Brentoyyy2315"
    };

    // Data
    let catalogItems = [];
    let currentSearchTerm = "";
    let currentCategoryFilter = "all";

    // Load items from localStorage
    function loadItems() {
        const stored = localStorage.getItem("dlc_catalog");
        if(stored) {
            catalogItems = JSON.parse(stored);
        } else {
            catalogItems = [
                { id: Date.now(), image: "https://picsum.photos/id/104/300/200", title: "Myth and Dragons Add-On", category: "Addon", link: "#" },
                { id: Date.now()+1, image: "https://picsum.photos/id/106/300/200", title: "Tower Defense World", category: "World", link: "#" },
                { id: Date.now()+2, image: "https://picsum.photos/id/15/300/200", title: "CAVE BIOMES ADD-ON", category: "Addon", link: "#" }
            ];
            saveItems();
        }
        renderCategoryChips();
        applyFiltersAndRender();
    }

    function saveItems() {
        localStorage.setItem("dlc_catalog", JSON.stringify(catalogItems));
    }

    function addItem(image, title, category, link) {
        const newItem = {
            id: Date.now(),
            image: image || "https://picsum.photos/id/1/300/200",
            title: title || "Untitled",
            category: category || "General",
            link: link || "#"
        };
        catalogItems.push(newItem);
        saveItems();
        renderCategoryChips();
        applyFiltersAndRender();
    }

    function deleteItem(id) {
        catalogItems = catalogItems.filter(item => item.id != id);
        saveItems();
        renderCategoryChips();
        applyFiltersAndRender();
    }

    // Get unique categories from items
    function getUniqueCategories() {
        const cats = catalogItems.map(item => item.category);
        return [...new Set(cats)].sort();
    }

    // Render category filter chips
    function renderCategoryChips() {
        const container = document.getElementById("categoryChips");
        if(!container) return;
        const categories = getUniqueCategories();
        let chipsHtml = `<button class="filter-chip ${currentCategoryFilter === "all" ? "active" : ""}" data-category="all">All</button>`;
        categories.forEach(cat => {
            chipsHtml += `<button class="filter-chip ${currentCategoryFilter === cat ? "active" : ""}" data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`;
        });
        container.innerHTML = chipsHtml;

        // Add event listeners
        document.querySelectorAll(".filter-chip").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const category = btn.getAttribute("data-category");
                currentCategoryFilter = category;
                renderCategoryChips(); // re-render to update active state
                applyFiltersAndRender();
            });
        });
    }

    // Filter items based on search and category
    function getFilteredItems() {
        let filtered = [...catalogItems];
        if (currentSearchTerm.trim() !== "") {
            const term = currentSearchTerm.trim().toLowerCase();
            filtered = filtered.filter(item => item.title.toLowerCase().includes(term));
        }
        if (currentCategoryFilter !== "all") {
            filtered = filtered.filter(item => item.category === currentCategoryFilter);
        }
        return filtered;
    }

    // Render catalog with grouping (only for unfiltered? but we want grouping to reflect filtered items)
    // Instead, we'll group filtered items by category, but show only categories that have any filtered items.
    function applyFiltersAndRender() {
        const filteredItems = getFilteredItems();
        const container = document.getElementById("catalogContainer");
        if(!container) return;

        if (filteredItems.length === 0) {
            container.innerHTML = `<div class="no-results">😕 No items match your search or filter. Try clearing filters.</div>`;
            updateAdminModeClass();
            return;
        }

        // Group filtered items by category
        const grouped = {};
        filteredItems.forEach(item => {
            if(!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        });

        let html = "";
        for(let cat in grouped) {
            html += `<div class="category-section">
                        <div class="category-title">📁 ${escapeHtml(cat)}</div>
                        <div class="items-grid">`;
            grouped[cat].forEach(item => {
                html += `<div class="item-card" data-id="${item.id}">
                            <img src="${item.image}" class="item-img" alt="${item.title}" onerror="this.src='https://picsum.photos/id/1/300/200'">
                            <div class="item-info">
                                <div class="item-title">${escapeHtml(item.title)}</div>
                                <div class="item-category">${escapeHtml(item.category)}</div>
                                <a href="${escapeHtml(item.link)}" class="item-link" target="_blank">🔗 Download</a>
                                <button class="delete-item" onclick="deleteItem(${item.id})" title="Delete Item">✖</button>
                            </div>
                        </div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        updateAdminModeClass();
    }

    function updateAdminModeClass() {
        const isAdmin = sessionStorage.getItem("admin_auth") === "true";
        if(isAdmin) {
            document.body.classList.add("admin-mode");
        } else {
            document.body.classList.remove("admin-mode");
        }
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Auth logic
    function isAuthenticated() {
        return sessionStorage.getItem("admin_auth") === "true";
    }

    function login(username, password) {
        if(username === ADMIN_CRED.username && password === ADMIN_CRED.password) {
            sessionStorage.setItem("admin_auth", "true");
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            applyFiltersAndRender();
            return true;
        } else {
            document.getElementById("loginError").innerText = "Invalid username or password.";
            return false;
        }
    }

    function logout() {
        sessionStorage.removeItem("admin_auth");
        document.getElementById("adminPanel").style.display = "none";
        applyFiltersAndRender();
        alert("You have been logged out.");
    }

    // Event Handlers
    document.getElementById("adminLoginBtn").onclick = () => {
        if(isAuthenticated()) {
            const panel = document.getElementById("adminPanel");
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        } else {
            document.getElementById("loginModal").style.display = "flex";
        }
    };

    document.getElementById("submitLogin").onclick = () => {
        const user = document.getElementById("loginUser").value;
        const pass = document.getElementById("loginPass").value;
        login(user, pass);
    };

    document.getElementById("logoutBtn").onclick = () => {
        logout();
    };

    document.getElementById("addItemBtn").onclick = () => {
        if(!isAuthenticated()) return;
        const img = document.getElementById("itemImage").value.trim();
        const title = document.getElementById("itemTitle").value.trim();
        const cat = document.getElementById("itemCategory").value.trim();
        const link = document.getElementById("itemLink").value.trim();
        if(!title) {
            alert("Please at least enter a title.");
            return;
        }
        addItem(img, title, cat, link);
        document.getElementById("itemImage").value = "";
        document.getElementById("itemTitle").value = "";
        document.getElementById("itemCategory").value = "";
        document.getElementById("itemLink").value = "";
    };

    // Search input listener
    const searchInput = document.getElementById("searchInput");
    if(searchInput) {
        searchInput.addEventListener("input", (e) => {
            currentSearchTerm = e.target.value;
            applyFiltersAndRender();
        });
    }

    // Clear filters button
    const clearBtn = document.getElementById("clearFiltersBtn");
    if(clearBtn) {
        clearBtn.addEventListener("click", () => {
            currentSearchTerm = "";
            currentCategoryFilter = "all";
            if(searchInput) searchInput.value = "";
            renderCategoryChips();
            applyFiltersAndRender();
        });
    }

    // Modal close on outside click
    window.onclick = (event) => {
        const modal = document.getElementById("loginModal");
        if (event.target === modal) {
            modal.style.display = "none";
        }
    };

    // Init
    loadItems();
    if(isAuthenticated()) {
        document.getElementById("adminPanel").style.display = "block";
    }
</script>

<style>
    /* Modal styles (added because they were missing in dark mode version) */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal-content {
        background: #1e293b;
        padding: 2rem;
        border-radius: 28px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        border: 1px solid #334155;
    }
    .modal-content h3 {
        color: #f1f5f9;
        margin-bottom: 1rem;
    }
    .modal-content input {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 16px;
        font-size: 1rem;
        color: #f8fafc;
    }
    .modal-content button {
        background-color: #3b82f6;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }
    .error-msg {
        color: #f87171;
        font-size: 0.85rem;
        margin-top: 10px;
    }
</style>
</body>
</html>
