<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Bedrock Marketplace — with Cart</title>
    <style>
        /* ===== BASE & DARK MODE (same as before, plus cart styles) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0c10;
            color: #eef2ff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header with Cart */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #1e293b;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            background: #1e293b;
            border: none;
            color: #f1f5f9;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-count {
            background: #3b82f6;
            color: white;
            border-radius: 30px;
            padding: 0 8px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .admin-btn {
            background-color: #334155;
            color: #f1f5f9;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }
        .cart-modal-content {
            background: #0f172a;
            max-width: 500px;
            width: 90%;
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid #1e293b;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 600;
        }
        .cart-item-category {
            font-size: 0.7rem;
            color: #93c5fd;
        }
        .remove-item {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .checkout-btn {
            background: #3b82f6;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
        .close-cart {
            background: #475569;
            margin-top: 10px;
        }

        /* Filter bar, admin panel, catalog – unchanged from your last version */
        .filter-bar {
            background: #0f172a;
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #1e293b;
        }
        .search-box {
            width: 100%;
            padding: 12px 18px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 48px;
            font-size: 1rem;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .filter-chip {
            background: #1e293b;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #cbd5e6;
            cursor: pointer;
        }
        .filter-chip.active {
            background: #3b82f6;
            color: white;
        }
        .clear-filters {
            background: transparent;
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Admin Dashboard (unchanged) */
        .admin-dashboard {
            display: none;
            background: #0f172a;
            padding: 2rem;
            border-radius: 28px;
            margin-bottom: 2rem;
            border: 1px solid #1e293b;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group input {
            padding: 12px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 16px;
            color: #f1f5f9;
            width: 100%;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        .logout-btn {
            background: #475569;
            margin-left: 15px;
        }

        /* Item Cards (with Add to Cart button) */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
        }
        .item-card {
            background: #111827;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #1e293b;
        }
        .item-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .item-info {
            padding: 1rem;
        }
        .item-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .item-category {
            font-size: 0.8rem;
            color: #93c5fd;
            margin-bottom: 1rem;
        }
        .item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .item-link, .add-to-cart {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
        }
        .add-to-cart {
            background: #10b981;
        }
        .add-to-cart:hover {
            background: #059669;
        }
        .delete-item {
            float: right;
            background: none;
            border: none;
            color: #f87171;
            font-size: 1.2rem;
            display: none;
            cursor: pointer;
        }
        .admin-mode .delete-item {
            display: inline-block;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
        .modal, .cart-modal { display: none; } /* both modals initially hidden */
    </style>
</head>
<body>

<div class="container">
    <div class="site-header">
        <div class="logo">ᴍɪɴᴇᴄʀᴀꜰᴛ ʙᴇᴅʀᴏᴄᴋ ᴍᴀʀᴋᴇᴛᴘʟᴀᴄᴇ</div>
        <div class="header-actions">
            <button id="cartButton" class="cart-icon">🛒 Cart <span id="cartCount" class="cart-count">0</span></button>
            <button id="adminLoginBtn" class="admin-btn">🔐 Admin</button>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search...">
        <div class="category-filters">
            <span class="filter-label">Category:</span>
            <div id="categoryChips"></div>
            <button id="clearFiltersBtn" class="clear-filters">Clear</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-dashboard">
        <div style="display: flex; justify-content: space-between;">
            <h2>Admin Controls</h2>
            <button id="logoutBtn" class="admin-btn logout-btn">Logout</button>
        </div>
        <div class="form-grid">
            <div class="form-group"><label>Image URL</label><input type="text" id="itemImage" placeholder="https://..."></div>
            <div class="form-group"><label>Title</label><input type="text" id="itemTitle" placeholder="Title"></div>
            <div class="form-group"><label>Category</label><input type="text" id="itemCategory" placeholder="Category"></div>
            <div class="form-group"><label>Download Link</label><input type="text" id="itemLink" placeholder="https://..."></div>
        </div>
        <button id="addItemBtn" class="btn-primary">➕ Add Item</button>
        <p style="font-size:0.8rem; margin-top:15px; color:#94a3b8;">Admin: X button on cards to delete.</p>
    </div>

    <!-- Catalog Container -->
    <div id="catalogContainer"></div>
</div>

<!-- Cart Modal -->
<div id="cartModal" class="cart-modal">
    <div class="cart-modal-content">
        <h3>Your Cart</h3>
        <div id="cartItemsList"></div>
        <button id="checkoutBtn" class="checkout-btn">📲 Checkout via Facebook</button>
        <button id="closeCartBtn" class="checkout-btn close-cart">Close</button>
    </div>
</div>

<!-- Login Modal (unchanged) -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>Admin Login</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button id="submitLogin">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<script>
    // ======================= CONFIGURATION =======================
    // CHANGE THIS: Your Facebook Page username or numeric ID
    const FACEBOOK_PAGE_NAME = "111811064292787";  // e.g., "MinecraftMarketPH" or "100063784512345"
    // =============================================================

    // Admin credentials
    const ADMIN_CRED = { username: "Brentoyyy2315", password: "@Brentoyyy2315" };

    // Data
    let catalogItems = [];
    let cart = [];  // each item: { id, title, category, link, image }

    // Filters
    let currentSearchTerm = "";
    let currentCategoryFilter = "all";

    // Load from localStorage
    function loadItems() {
        const stored = localStorage.getItem("dlc_catalog");
        if(stored) {
            catalogItems = JSON.parse(stored);
        } else {
            catalogItems = [
                { id: Date.now(), image: "https://picsum.photos/id/104/300/200", title: "Dragon Slayer Pack", category: "Addon", link: "#" },
                { id: Date.now()+1, image: "https://picsum.photos/id/106/300/200", title: "Tower Defense World", category: "World", link: "#" },
                { id: Date.now()+2, image: "https://picsum.photos/id/15/300/200", title: "Cave Biomes", category: "Addon", link: "#" }
            ];
            saveItems();
        }
        loadCart();
        renderCategoryChips();
        applyFiltersAndRender();
        updateCartUI();
    }

    function saveItems() { localStorage.setItem("dlc_catalog", JSON.stringify(catalogItems)); }

    // Cart functions
    function loadCart() {
        const storedCart = localStorage.getItem("cart");
        if(storedCart) cart = JSON.parse(storedCart);
        else cart = [];
        updateCartUI();
    }
    function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartUI();
    }
    function addToCart(item) {
        // avoid duplicates: if already in cart, do nothing (optional: increase quantity)
        if(!cart.some(cartItem => cartItem.id === item.id)) {
            cart.push({ ...item });
            saveCart();
        } else {
            alert("Item already in cart.");
        }
    }
    function removeFromCart(itemId) {
        cart = cart.filter(i => i.id !== itemId);
        saveCart();
        renderCartModal();  // refresh modal if open
    }
    function updateCartUI() {
        const count = cart.length;
        document.getElementById("cartCount").innerText = count;
    }
    function renderCartModal() {
        const container = document.getElementById("cartItemsList");
        if(!container) return;
        if(cart.length === 0) {
            container.innerHTML = "<p>Cart is empty.</p>";
            return;
        }
        let html = "";
        cart.forEach(item => {
            html += `<div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${escapeHtml(item.title)}</div>
                            <div class="cart-item-category">${escapeHtml(item.category)}</div>
                        </div>
                        <button class="remove-item" data-id="${item.id}">✖</button>
                    </div>`;
        });
        container.innerHTML = html;
        // attach remove events
        document.querySelectorAll(".remove-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                removeFromCart(id);
            });
        });
    }

    // Checkout: open Facebook Messenger with order details
    function checkoutViaFacebook() {
        if(cart.length === 0) {
            alert("Your cart is empty.");
            return;
        }
        // Build order summary
        let orderText = "🛒 *NEW ORDER* 🛒\n\n";
        cart.forEach((item, idx) => {
            orderText += `${idx+1}. ${item.title} (${item.category})\n   Link: ${item.link}\n`;
        });
        orderText += `\nTotal items: ${cart.length}\nPlease send payment instructions / GCash QR. Thank you!`;

        // Encode for Messenger URL
        const encodedMsg = encodeURIComponent(orderText);
        // Facebook Messenger deep link: https://m.me/PAGE_NAME?text=...
        const fbUrl = `https://m.me/${FACEBOOK_PAGE_NAME}?text=${encodedMsg}`;
        window.open(fbUrl, "_blank");
        // Optional: clear cart after checkout? Up to you. We'll keep cart for now.
        // User can manually clear.
        document.getElementById("cartModal").style.display = "none";
        alert("Order message prepared! Send it to our Facebook page. We'll reply with payment details.");
        // You can choose to clear cart: cart = []; saveCart(); updateCartUI(); but maybe user wants to keep.
    }

    // Catalog rendering (with Add to Cart button)
    function getFilteredItems() {
        let filtered = [...catalogItems];
        if(currentSearchTerm.trim()) {
            const term = currentSearchTerm.toLowerCase();
            filtered = filtered.filter(i => i.title.toLowerCase().includes(term));
        }
        if(currentCategoryFilter !== "all") {
            filtered = filtered.filter(i => i.category === currentCategoryFilter);
        }
        return filtered;
    }

    function applyFiltersAndRender() {
        const filtered = getFilteredItems();
        const container = document.getElementById("catalogContainer");
        if(!container) return;
        if(filtered.length === 0) {
            container.innerHTML = `<div class="no-results">No items match.</div>`;
            updateAdminModeClass();
            return;
        }
        const grouped = {};
        filtered.forEach(item => {
            if(!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        });
        let html = "";
        for(let cat in grouped) {
            html += `<div class="category-section"><div class="category-title">📁 ${escapeHtml(cat)}</div><div class="items-grid">`;
            grouped[cat].forEach(item => {
                html += `<div class="item-card" data-id="${item.id}">
                            <img src="${item.image}" class="item-img" onerror="this.src='https://picsum.photos/id/1/300/200'">
                            <div class="item-info">
                                <div class="item-title">${escapeHtml(item.title)}</div>
                                <div class="item-category">${escapeHtml(item.category)}</div>
                                <div class="item-actions">
                                    <a href="${escapeHtml(item.link)}" class="item-link" target="_blank">🔗 Download</a>
                                    <button class="add-to-cart" data-id="${item.id}" data-title="${escapeHtml(item.title)}" data-category="${escapeHtml(item.category)}" data-link="${escapeHtml(item.link)}" data-image="${escapeHtml(item.image)}">➕ Cart</button>
                                    <button class="delete-item" data-id="${item.id}">✖</button>
                                </div>
                            </div>
                        </div>`;
            });
            html += `</div></div>`;
        }
        container.innerHTML = html;
        // Attach event listeners for Add to Cart
        document.querySelectorAll(".add-to-cart").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                const title = btn.getAttribute("data-title");
                const category = btn.getAttribute("data-category");
                const link = btn.getAttribute("data-link");
                const image = btn.getAttribute("data-image");
                addToCart({ id, title, category, link, image });
            });
        });
        // Delete buttons (admin)
        document.querySelectorAll(".delete-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                if(confirm("Delete item?")) deleteItem(id);
            });
        });
        updateAdminModeClass();
    }

    function deleteItem(id) {
        catalogItems = catalogItems.filter(i => i.id !== id);
        saveItems();
        // also remove from cart if present
        cart = cart.filter(i => i.id !== id);
        saveCart();
        renderCategoryChips();
        applyFiltersAndRender();
        renderCartModal();
    }

    // Category chips
    function getUniqueCategories() {
        const cats = catalogItems.map(i => i.category);
        return [...new Set(cats)].sort();
    }
    function renderCategoryChips() {
        const container = document.getElementById("categoryChips");
        if(!container) return;
        const cats = getUniqueCategories();
        let html = `<button class="filter-chip ${currentCategoryFilter === "all" ? "active" : ""}" data-cat="all">All</button>`;
        cats.forEach(cat => {
            html += `<button class="filter-chip ${currentCategoryFilter === cat ? "active" : ""}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(".filter-chip").forEach(btn => {
            btn.addEventListener("click", () => {
                currentCategoryFilter = btn.getAttribute("data-cat");
                renderCategoryChips();
                applyFiltersAndRender();
            });
        });
    }

    function addItem(img, title, cat, link) {
        const newItem = {
            id: Date.now(),
            image: img || "https://picsum.photos/id/1/300/200",
            title: title || "Untitled",
            category: cat || "General",
            link: link || "#"
        };
        catalogItems.push(newItem);
        saveItems();
        renderCategoryChips();
        applyFiltersAndRender();
    }

    // Auth
    function isAuthenticated() { return sessionStorage.getItem("admin_auth") === "true"; }
    function login(u,p) {
        if(u===ADMIN_CRED.username && p===ADMIN_CRED.password) {
            sessionStorage.setItem("admin_auth","true");
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            applyFiltersAndRender();
            return true;
        } else {
            document.getElementById("loginError").innerText = "Invalid credentials";
            return false;
        }
    }
    function logout() {
        sessionStorage.removeItem("admin_auth");
        document.getElementById("adminPanel").style.display = "none";
        applyFiltersAndRender();
    }
    function updateAdminModeClass() {
        if(isAuthenticated()) document.body.classList.add("admin-mode");
        else document.body.classList.remove("admin-mode");
    }

    // Helper
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listeners
    document.getElementById("adminLoginBtn").onclick = () => {
        if(isAuthenticated()) {
            const panel = document.getElementById("adminPanel");
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        } else {
            document.getElementById("loginModal").style.display = "flex";
        }
    };
    document.getElementById("submitLogin").onclick = () => {
        login(document.getElementById("loginUser").value, document.getElementById("loginPass").value);
    };
    document.getElementById("logoutBtn").onclick = () => logout();
    document.getElementById("addItemBtn").onclick = () => {
        if(!isAuthenticated()) return;
        const img = document.getElementById("itemImage").value.trim();
        const title = document.getElementById("itemTitle").value.trim();
        const cat = document.getElementById("itemCategory").value.trim();
        const link = document.getElementById("itemLink").value.trim();
        if(!title) { alert("Title required"); return; }
        addItem(img, title, cat, link);
        document.getElementById("itemImage").value = "";
        document.getElementById("itemTitle").value = "";
        document.getElementById("itemCategory").value = "";
        document.getElementById("itemLink").value = "";
    };
    document.getElementById("searchInput").addEventListener("input", (e) => {
        currentSearchTerm = e.target.value;
        applyFiltersAndRender();
    });
    document.getElementById("clearFiltersBtn").onclick = () => {
        currentSearchTerm = "";
        currentCategoryFilter = "all";
        document.getElementById("searchInput").value = "";
        renderCategoryChips();
        applyFiltersAndRender();
    };
    // Cart modal
    const cartModal = document.getElementById("cartModal");
    document.getElementById("cartButton").onclick = () => {
        renderCartModal();
        cartModal.style.display = "flex";
    };
    document.getElementById("closeCartBtn").onclick = () => { cartModal.style.display = "none"; };
    document.getElementById("checkoutBtn").onclick = () => { checkoutViaFacebook(); };
    window.onclick = (e) => {
        if(e.target === cartModal) cartModal.style.display = "none";
        if(e.target === document.getElementById("loginModal")) document.getElementById("loginModal").style.display = "none";
    };

    // Init
    loadItems();
    if(isAuthenticated()) document.getElementById("adminPanel").style.display = "block";

    // Additional modal styles (missing from earlier)
    const style = document.createElement('style');
    style.textContent = `
        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 2rem;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal-content input {
            background: #020617;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            width: 100%;
            border-radius: 16px;
        }
        .category-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            border-left: 5px solid #60a5fa;
            padding-left: 15px;
            margin-top: 1.5rem;
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
