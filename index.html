<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Bedrock Marketplace — Cloud Sync (Global Visitor Count)</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* Your existing CSS remains unchanged */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0c10; color: #eef2ff; }
        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }
        .site-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #1e293b; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .visit-counter { background: #1e293b; padding: 0.5rem 1rem; border-radius: 40px; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; color: #fbbf24; }
        .cart-icon, .suggestion-btn { background: #1e293b; border: none; color: #f1f5f9; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .cart-count { background: #3b82f6; color: white; border-radius: 30px; padding: 0 8px; font-size: 0.75rem; font-weight: bold; }
        .admin-btn { background-color: #334155; color: #f1f5f9; border: none; padding: 0.6rem 1.2rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .announcement { background: linear-gradient(135deg, #1e293b, #0f172a); border-left: 6px solid #fbbf24; border-radius: 20px; padding: 1rem 1.5rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 12px; }
        .announcement-icon { font-size: 1.8rem; }
        .announcement-text { flex: 1; font-size: 1rem; }
        .filter-bar { background: #0f172a; border-radius: 28px; padding: 1.2rem 1.5rem; margin-bottom: 2rem; border: 1px solid #1e293b; }
        .search-box { width: 100%; padding: 12px 18px; background: #020617; border: 1px solid #334155; border-radius: 48px; font-size: 1rem; color: white; margin-bottom: 1rem; }
        .category-filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .filter-chip { background: #1e293b; border: none; padding: 6px 16px; border-radius: 40px; color: #cbd5e6; cursor: pointer; }
        .filter-chip.active { background: #3b82f6; color: white; }
        .clear-filters { background: transparent; border: 1px solid #ef4444; color: #f87171; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .admin-dashboard { display: none; background: #0f172a; padding: 2rem; border-radius: 28px; margin-bottom: 2rem; border: 1px solid #1e293b; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: #cbd5e1; }
        .form-group input, .form-group textarea { padding: 12px; background: #020617; border: 1px solid #334155; border-radius: 16px; color: white; }
        .checkbox-group { flex-direction: row; align-items: center; gap: 8px; }
        .btn-primary { background: #3b82f6; color: white; padding: 12px 20px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #475569; margin-left: 10px; }
        .logout-btn { background: #475569; margin-left: 15px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; }
        .item-card { background: #111827; border-radius: 24px; overflow: hidden; border: 1px solid #1e293b; position: relative; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -10px black; }
        .featured-badge { position: absolute; top: 8px; left: 8px; background: #fbbf24; color: #0a0c10; font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 30px; z-index: 10; }
        .item-img { width: 100%; height: 160px; object-fit: cover; background: #1e293b; }
        .item-info { padding: 1rem; }
        .item-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.25rem; padding-right: 30px; }
        .item-category { font-size: 0.75rem; color: #93c5fd; margin-bottom: 0.5rem; }
        .item-price { font-size: 1.2rem; font-weight: bold; color: #fbbf24; margin-bottom: 0.8rem; }
        .add-to-cart { background: #10b981; color: white; padding: 8px 16px; border-radius: 40px; border: none; cursor: pointer; width: 100%; }
        .item-actions-admin { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 10; display: none; }
        .admin-mode .item-actions-admin { display: flex; }
        .delete-item, .edit-item { background: rgba(0,0,0,0.7); border: none; width: 28px; height: 28px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .delete-item { color: #f87171; }
        .edit-item { color: #60a5fa; }
        .category-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; border-left: 5px solid #60a5fa; padding-left: 15px; margin-top: 1rem; }
        .no-results { text-align: center; padding: 3rem; color: #94a3b8; background: #0f172a; border-radius: 28px; }
        .cart-modal, .suggestion-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1001; justify-content: center; align-items: center; }
        .cart-modal-content, .suggestion-modal-content { background: #0f172a; max-width: 500px; width: 90%; border-radius: 28px; padding: 1.5rem; border: 1px solid #1e293b; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .cart-total { margin-top: 15px; text-align: right; font-weight: bold; border-top: 1px solid #1e293b; padding-top: 12px; }
        .remove-item { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1.2rem; }
        .checkout-btn, .send-suggestion-btn { background: #3b82f6; width: 100%; padding: 12px; border: none; border-radius: 40px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .close-cart, .close-suggestion { background: #475569; margin-top: 10px; }
        .suggestion-modal textarea { width: 100%; padding: 12px; background: #020617; border: 1px solid #334155; border-radius: 16px; color: white; margin-top: 1rem; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 12px 0; background: #0f172a; border: 1px solid #334155; border-radius: 16px; color: white; }
        .error-msg { color: #f87171; }
        .firebase-status { background: #1e293b; padding: 6px 12px; border-radius: 24px; font-size: 0.7rem; margin-left: 10px; }
        @media (max-width: 700px) { .container { padding: 1rem; } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="site-header">
        <div class="logo">ᴍɪɴᴇᴄʀᴀꜰᴛ ʙᴇᴅʀᴏᴄᴋ ᴍᴀʀᴋᴇᴛᴘʟᴀᴄᴇ</div>
        <div class="header-actions">
            <div class="visit-counter" id="visitCounter">👁️ Visits: ...</div>
            <button id="suggestionBtn" class="suggestion-btn">💬 Suggestion</button>
            <button id="cartButton" class="cart-icon">🛒 Cart <span id="cartCount" class="cart-count">0</span></button>
            <button id="adminLoginBtn" class="admin-btn">🔐 Admin</button>
        </div>
    </div>

    <div id="announcementPanel" class="announcement" style="display: none;">
        <div class="announcement-icon">📢</div>
        <div id="announcementText" class="announcement-text"></div>
        <button id="editAnnouncementBtn" class="edit-announcement-btn" style="display: none;">✏️ Edit</button>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by title...">
        <div class="category-filters">
            <span class="filter-label">Category:</span>
            <div id="categoryChips"></div>
            <button id="clearFiltersBtn" class="clear-filters">Clear all</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>➕ Admin Controls</h2>
            <div>
                <button id="firebaseLoginBtn" class="admin-btn" style="background:#3b82f6; margin-right:10px;">🔑 Login to Firebase</button>
                <button id="logoutBtn" class="admin-btn logout-btn">🚪 Logout</button>
            </div>
        </div>
        <div style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 15px;" id="formTitle">Add New Item</h3>
            <div class="form-grid">
                <div class="form-group"><label>Image URL:</label><input type="text" id="itemImage" placeholder="https://..."></div>
                <div class="form-group"><label>Title:</label><input type="text" id="itemTitle" placeholder="e.g., Dragon Slayer Pack"></div>
                <div class="form-group"><label>Category:</label><input type="text" id="itemCategory" placeholder="e.g., Addons / Worlds"></div>
                <div class="form-group"><label>Price (₱ PHP):</label><input type="number" id="itemPrice" step="1" value="0"></div>
                <div class="form-group checkbox-group"><label><input type="checkbox" id="itemFeatured"> ⭐ Featured Item</label></div>
            </div>
            <div>
                <button id="addItemBtn" class="btn-primary">➕ Add Item</button>
                <button id="cancelEditBtn" class="btn-primary btn-secondary" style="display: none;">Cancel Edit</button>
            </div>
        </div>
        <div style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <h3>📢 Announcement Banner</h3>
            <div class="form-group">
                <label>Announcement Text (supports emoji & links):</label>
                <textarea id="announcementInput" rows="3" style="width: 100%;"></textarea>
                <small style="color:#94a3b8;">You can use HTML links</small>
            </div>
            <button id="saveAnnouncementBtn" class="btn-primary">💾 Save Announcement</button>
        </div>
        <p style="font-size:0.8rem; margin-top:20px; color:#94a3b8;">⚡ Admin: Hover over any card to see Edit/Delete buttons. <span id="fbStatus" class="firebase-status" style="background:#ef4444;">⚠️ Not logged to Firebase</span></p>
    </div>

    <div id="catalogContainer"></div>
</div>

<!-- Cart Modal -->
<div id="cartModal" class="cart-modal">
    <div class="cart-modal-content">
        <h3>Your Cart</h3>
        <div id="cartItemsList"></div>
        <div id="cartTotal" class="cart-total"></div>
        <button id="checkoutBtn" class="checkout-btn">📲 Checkout via Facebook</button>
        <button id="closeCartBtn" class="checkout-btn close-cart">Close</button>
    </div>
</div>

<!-- Suggestion Modal -->
<div id="suggestionModal" class="suggestion-modal">
    <div class="suggestion-modal-content">
        <h3>💡 Send a Suggestion</h3>
        <textarea id="suggestionText" rows="5" placeholder="What would you like to see?"></textarea>
        <button id="sendSuggestionBtn" class="send-suggestion-btn">📨 Send to Facebook</button>
        <button id="closeSuggestionBtn" class="send-suggestion-btn close-suggestion">Close</button>
    </div>
</div>

<!-- Login Modal (for local admin panel visibility) -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔒 Admin Access Only</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button id="submitLogin">Login</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<script>
    // ======================= FIREBASE CONFIGURATION =======================
    // 🔥 REPLACE WITH YOUR OWN firebaseConfig
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAco1a008Xxsc2t-7htzIF_tCDpEipQ8Sw",
  authDomain: "minecraft-marketplace-7227b.firebaseapp.com",
  databaseURL: "https://minecraft-marketplace-7227b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "minecraft-marketplace-7227b",
  storageBucket: "minecraft-marketplace-7227b.firebasestorage.app",
  messagingSenderId: "76080707372",
  appId: "1:76080707372:web:6e653bbfc45ddf3b4e9e89",
  measurementId: "G-8LRMG5S33X"
};
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    // ======================================================================

    const FACEBOOK_PAGE_ID = "111811064292787";
    const ADMIN_CRED = { username: "Brentoyyy2315", password: "@Brentoyyy2315" };

    let catalogItems = [];
    let cart = [];
    let currentSearchTerm = "";
    let currentCategoryFilter = "all";
    let editingItemId = null;
    let announcementHtml = "";

    // ---------- Global Visit Counter using Firebase ----------
    async function updateGlobalVisitCounter() {
        const counterElem = document.getElementById("visitCounter");
        const counterRef = database.ref('visitorCount');
        
        try {
            // Increment the counter atomically
            await counterRef.transaction(currentCount => (currentCount || 0) + 1);
            
            // Listen for real-time updates
            counterRef.on('value', (snapshot) => {
                const count = snapshot.val() || 0;
                counterElem.innerHTML = `👁️ Visits: ${count.toLocaleString()}`;
            });
        } catch (err) {
            console.error("Firebase counter error:", err);
            counterElem.innerHTML = "👁️ Visits: --";
        }
    }

    // ---------- Firebase Auth Status UI ----------
    function updateFirebaseStatusUI() {
        const user = auth.currentUser;
        const statusSpan = document.getElementById("fbStatus");
        if (statusSpan) {
            if (user) {
                statusSpan.innerHTML = `✅ Firebase: ${user.email}`;
                statusSpan.style.background = "#10b981";
            } else {
                statusSpan.innerHTML = "⚠️ Not logged to Firebase (can't add/edit)";
                statusSpan.style.background = "#ef4444";
            }
        }
    }

    // ---------- Listen to catalog from Firebase ----------
    function listenToCatalog() {
        const catalogRef = database.ref('catalog');
        catalogRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                catalogItems = Object.entries(data).map(([key, item]) => ({ 
                    id: parseInt(key), 
                    ...item,
                    featured: item.featured === true 
                }));
            } else {
                catalogItems = [];
            }
            renderCategoryChips();
            applyFiltersAndRender();
        }, (error) => {
            console.error("Firebase read error:", error);
            alert("Failed to load catalog from Firebase. Check your database rules and internet.");
        });
    }

    // ---------- Sync catalog to Firebase (only if authenticated) ----------
    async function syncCatalogToFirebase() {
        const user = auth.currentUser;
        if (!user) {
            alert("❌ You are not logged into Firebase. Please click 'Login to Firebase' button first.");
            throw new Error("Not authenticated");
        }
        const obj = {};
        catalogItems.forEach(item => {
            obj[item.id] = {
                image: item.image,
                title: item.title,
                category: item.category,
                price: item.price,
                featured: item.featured
            };
        });
        await database.ref('catalog').set(obj);
        return true;
    }

    // ---------- Admin CRUD ----------
    async function addItem(image, title, category, price, featured) {
        const newId = Date.now();
        const newItem = { 
            id: newId, 
            image: image || "https://picsum.photos/id/1/300/200", 
            title: title || "Untitled", 
            category: category || "General", 
            price: parseFloat(price) || 0, 
            featured: featured === true 
        };
        catalogItems.push(newItem);
        try {
            await syncCatalogToFirebase();
            renderCategoryChips();
            applyFiltersAndRender();
            return true;
        } catch (err) {
            catalogItems.pop();
            alert("Failed to save to Firebase: " + err.message);
            return false;
        }
    }

    async function updateItem(id, image, title, category, price, featured) {
        const index = catalogItems.findIndex(i => i.id === id);
        if (index === -1) return;
        const original = { ...catalogItems[index] };
        catalogItems[index] = { 
            ...catalogItems[index], 
            image: image || "https://picsum.photos/id/1/300/200",
            title: title || "Untitled",
            category: category || "General",
            price: parseFloat(price) || 0,
            featured: featured === true
        };
        try {
            await syncCatalogToFirebase();
            renderCategoryChips();
            applyFiltersAndRender();
            setEditMode(false); // exit edit mode after successful update
        } catch (err) {
            catalogItems[index] = original;
            alert("Update failed: " + err.message);
        }
    }

    async function deleteItem(id) {
        catalogItems = catalogItems.filter(i => i.id !== id);
        try {
            await syncCatalogToFirebase();
            renderCategoryChips();
            applyFiltersAndRender();
            renderCartModal();
        } catch (err) {
            alert("Delete failed: " + err.message);
            listenToCatalog(); // reload original
        }
    }

    function setEditMode(isEditing, item = null) {
        const addBtn = document.getElementById("addItemBtn");
        const cancelBtn = document.getElementById("cancelEditBtn");
        const formTitle = document.getElementById("formTitle");
        if (isEditing && item) {
            addBtn.innerHTML = "✏️ Update Item";
            addBtn.style.background = "#f59e0b";
            cancelBtn.style.display = "inline-block";
            formTitle.innerHTML = "✏️ Edit Item";
            editingItemId = item.id;
            document.getElementById("itemImage").value = item.image || "";
            document.getElementById("itemTitle").value = item.title || "";
            document.getElementById("itemCategory").value = item.category || "";
            document.getElementById("itemPrice").value = item.price || 0;
            document.getElementById("itemFeatured").checked = item.featured === true;
        } else {
            addBtn.innerHTML = "➕ Add Item";
            addBtn.style.background = "#3b82f6";
            cancelBtn.style.display = "none";
            formTitle.innerHTML = "Add New Item";
            editingItemId = null;
            clearForm();
        }
    }

    function clearForm() {
        document.getElementById("itemImage").value = "";
        document.getElementById("itemTitle").value = "";
        document.getElementById("itemCategory").value = "";
        document.getElementById("itemPrice").value = "";
        document.getElementById("itemFeatured").checked = false;
    }

    function cancelEdit() {
        setEditMode(false);
    }

    function startEdit(item) {
        setEditMode(true, item);
        document.getElementById("adminPanel").scrollIntoView({ behavior: "smooth" });
    }

    // ---------- Cart (localStorage only) ----------
    function loadCart() {
        const stored = localStorage.getItem("cart");
        cart = stored ? JSON.parse(stored) : [];
        updateCartUI();
    }
    function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartUI();
    }
    function addToCart(item) {
        if (!cart.some(c => c.id === item.id)) {
            cart.push({ ...item });
            saveCart();
        } else { alert("Item already in cart."); }
    }
    function removeFromCart(itemId) {
        cart = cart.filter(i => i.id !== itemId);
        saveCart();
        renderCartModal();
    }
    function updateCartUI() { document.getElementById("cartCount").innerText = cart.length; }
    function renderCartModal() {
        const container = document.getElementById("cartItemsList");
        const totalContainer = document.getElementById("cartTotal");
        if (cart.length === 0) {
            container.innerHTML = "<p>Your cart is empty.</p>";
            totalContainer.innerHTML = "";
            return;
        }
        let html = "", total = 0;
        cart.forEach(item => {
            total += item.price || 0;
            html += `<div class="cart-item"><div class="cart-item-info">${escapeHtml(item.title)}<div class="cart-item-price">₱${((item.price||0)).toFixed(2)}</div></div><button class="remove-item" data-id="${item.id}">✖</button></div>`;
        });
        container.innerHTML = html;
        totalContainer.innerHTML = `Total: ₱${total.toFixed(2)}`;
        document.querySelectorAll(".remove-item").forEach(btn => btn.addEventListener("click", (e) => removeFromCart(parseInt(btn.getAttribute("data-id")))));
    }
    function checkoutViaFacebook() {
        if (cart.length === 0) { alert("Cart empty"); return; }
        let total = cart.reduce((s,i)=>s+(i.price||0),0);
        let msg = "🛒 *NEW ORDER*\n\n" + cart.map((i,idx)=>`${idx+1}. ${i.title} - ₱${(i.price||0).toFixed(2)}`).join("\n") + `\n\nTotal: ₱${total.toFixed(2)}`;
        window.open(`https://m.me/${FACEBOOK_PAGE_ID}?text=${encodeURIComponent(msg)}`,"_blank");
        document.getElementById("cartModal").style.display = "none";
    }

    // ---------- Rendering ----------
    function applyFiltersAndRender() {
        const container = document.getElementById("catalogContainer");
        if (!container) return;
        let featuredItems = catalogItems.filter(i => i.featured === true);
        let nonFeatured = catalogItems.filter(i => !i.featured);
        if (currentSearchTerm.trim()) {
            const term = currentSearchTerm.toLowerCase();
            featuredItems = featuredItems.filter(i => i.title.toLowerCase().includes(term));
            nonFeatured = nonFeatured.filter(i => i.title.toLowerCase().includes(term));
        }
        if (currentCategoryFilter !== "all") {
            featuredItems = featuredItems.filter(i => i.category === currentCategoryFilter);
            nonFeatured = nonFeatured.filter(i => i.category === currentCategoryFilter);
        }
        if (featuredItems.length === 0 && nonFeatured.length === 0) {
            container.innerHTML = `<div class="no-results">😕 No items match.</div>`;
            updateAdminModeClass();
            return;
        }
        let html = "";
        if (featuredItems.length) {
            html += `<div class="category-section"><div class="category-title">⭐ Featured Items</div><div class="items-grid">` + featuredItems.map(renderItemCard).join('') + `</div></div>`;
        }
        const grouped = {};
        nonFeatured.forEach(i => { if (!grouped[i.category]) grouped[i.category] = []; grouped[i.category].push(i); });
        for (let cat in grouped) {
            html += `<div class="category-section"><div class="category-title">📁 ${escapeHtml(cat)}</div><div class="items-grid">` + grouped[cat].map(renderItemCard).join('') + `</div></div>`;
        }
        container.innerHTML = html;
        // Attach events
        document.querySelectorAll(".add-to-cart").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.getAttribute("data-id"));
                const title = btn.getAttribute("data-title");
                const category = btn.getAttribute("data-category");
                const price = parseFloat(btn.getAttribute("data-price"));
                const image = btn.getAttribute("data-image");
                addToCart({ id, title, category, price, image });
            });
        });
        document.querySelectorAll(".delete-item").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute("data-id"));
                if (confirm("Delete this item permanently?")) await deleteItem(id);
            });
        });
        document.querySelectorAll(".edit-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute("data-id"));
                const item = catalogItems.find(i => i.id === id);
                if (item) startEdit(item);
            });
        });
        updateAdminModeClass();
    }
    function renderItemCard(item) {
        const price = item.price || 0;
        return `<div class="item-card">
            <div class="item-actions-admin"><button class="edit-item" data-id="${item.id}">✏️</button><button class="delete-item" data-id="${item.id}">✖</button></div>
            ${item.featured ? '<div class="featured-badge">⭐ Featured</div>' : ''}
            <img src="${escapeHtml(item.image)}" class="item-img" onerror="this.src='https://picsum.photos/id/1/300/200'">
            <div class="item-info"><div class="item-title">${escapeHtml(item.title)}</div><div class="item-category">${escapeHtml(item.category)}</div><div class="item-price">₱${price.toFixed(2)}</div><button class="add-to-cart" data-id="${item.id}" data-title="${escapeHtml(item.title)}" data-category="${escapeHtml(item.category)}" data-price="${price}" data-image="${escapeHtml(item.image)}">➕ Add to Cart</button></div>
        </div>`;
    }
    function getUniqueCategories() { return [...new Set(catalogItems.map(i => i.category))].sort(); }
    function renderCategoryChips() {
        const container = document.getElementById("categoryChips");
        if (!container) return;
        const cats = getUniqueCategories();
        let html = `<button class="filter-chip ${currentCategoryFilter === "all" ? "active" : ""}" data-cat="all">All</button>`;
        cats.forEach(cat => { html += `<button class="filter-chip ${currentCategoryFilter === cat ? "active" : ""}" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`; });
        container.innerHTML = html;
        document.querySelectorAll(".filter-chip").forEach(btn => btn.addEventListener("click", () => { currentCategoryFilter = btn.getAttribute("data-cat"); renderCategoryChips(); applyFiltersAndRender(); }));
    }

    // Announcement (localStorage)
    function loadAnnouncement() { const saved = localStorage.getItem("announcement"); announcementHtml = saved || "✨ Welcome to our marketplace! Check out our featured items below. ✨"; renderAnnouncement(); }
    function saveAnnouncement(text) { announcementHtml = text; localStorage.setItem("announcement", announcementHtml); renderAnnouncement(); alert("Announcement saved locally on this device."); }
    function renderAnnouncement() { 
        const panel = document.getElementById("announcementPanel");
        if (announcementHtml && announcementHtml.trim()) { document.getElementById("announcementText").innerHTML = announcementHtml; panel.style.display = "flex"; } else panel.style.display = "none";
        document.getElementById("editAnnouncementBtn").style.display = isAuthenticated() ? "inline-block" : "none";
    }

    // Suggestion
    function sendSuggestionToFB() { const sug = document.getElementById("suggestionText").value.trim(); if(!sug) return alert("Enter suggestion"); window.open(`https://m.me/${FACEBOOK_PAGE_ID}?text=${encodeURIComponent("💡 *SUGGESTION*\n"+sug)}`,"_blank"); document.getElementById("suggestionModal").style.display = "none"; document.getElementById("suggestionText").value=""; alert("Sent!"); }

    // Admin auth for panel visibility
    function isAuthenticated() { return sessionStorage.getItem("admin_auth") === "true"; }
    function login(username, password) {
        if(username === ADMIN_CRED.username && password === ADMIN_CRED.password) {
            sessionStorage.setItem("admin_auth", "true");
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            applyFiltersAndRender();
            renderAnnouncement();
            return true;
        } else { document.getElementById("loginError").innerText = "Invalid credentials."; return false; }
    }
    function logout() { sessionStorage.removeItem("admin_auth"); document.getElementById("adminPanel").style.display = "none"; applyFiltersAndRender(); renderAnnouncement(); }
    function updateAdminModeClass() { if(isAuthenticated()) document.body.classList.add("admin-mode"); else document.body.classList.remove("admin-mode"); }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ---------- Firebase Login ----------
    async function firebaseLogin() {
        const email = prompt("Enter your Firebase Admin Email:");
        if (!email) return;
        const password = prompt("Enter your Firebase Admin Password:");
        if (!password) return;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            alert("✅ Successfully logged into Firebase! You can now add/edit items globally.");
            updateFirebaseStatusUI();
        } catch (err) {
            alert("Firebase login failed: " + err.message);
        }
    }

    // ---------- Event Listeners ----------
    document.getElementById("adminLoginBtn").onclick = () => { if(isAuthenticated()) { document.getElementById("adminPanel").style.display = document.getElementById("adminPanel").style.display === "none" ? "block" : "none"; renderAnnouncement(); } else document.getElementById("loginModal").style.display = "flex"; };
    document.getElementById("submitLogin").onclick = () => login(document.getElementById("loginUser").value, document.getElementById("loginPass").value);
    document.getElementById("logoutBtn").onclick = () => logout();
    document.getElementById("firebaseLoginBtn").onclick = firebaseLogin;

    document.getElementById("addItemBtn").onclick = async () => {
        if (!isAuthenticated()) {
            alert("Please login as site admin first (using the Admin button).");
            return;
        }
        if (!auth.currentUser) {
            alert("You are not logged into Firebase.\n\nPlease click the 'Login to Firebase' button above and sign in with your Firebase admin email/password.\n\nAfter that, you can add/edit items globally.");
            return;
        }
        if (editingItemId !== null) {
            // Update existing item
            const img = document.getElementById("itemImage").value.trim();
            const title = document.getElementById("itemTitle").value.trim();
            const cat = document.getElementById("itemCategory").value.trim();
            const price = document.getElementById("itemPrice").value.trim();
            const featured = document.getElementById("itemFeatured").checked;
            if (!title) return alert("Title required");
            await updateItem(editingItemId, img, title, cat, price, featured);
        } else {
            // Add new item
            const img = document.getElementById("itemImage").value.trim();
            const title = document.getElementById("itemTitle").value.trim();
            const cat = document.getElementById("itemCategory").value.trim();
            const price = document.getElementById("itemPrice").value.trim();
            const featured = document.getElementById("itemFeatured").checked;
            if (!title) return alert("Title required");
            const success = await addItem(img, title, cat, price, featured);
            if (success) clearForm();
        }
    };
    document.getElementById("cancelEditBtn").onclick = cancelEdit;
    document.getElementById("saveAnnouncementBtn").onclick = () => { const newText = document.getElementById("announcementInput").value; saveAnnouncement(newText); };
    document.getElementById("editAnnouncementBtn").onclick = () => { document.getElementById("announcementInput").value = announcementHtml; document.getElementById("adminPanel").style.display = "block"; document.getElementById("adminPanel").scrollIntoView({ behavior: "smooth" }); };
    document.getElementById("searchInput").addEventListener("input", (e) => { currentSearchTerm = e.target.value; applyFiltersAndRender(); });
    document.getElementById("clearFiltersBtn").onclick = () => { currentSearchTerm = ""; currentCategoryFilter = "all"; document.getElementById("searchInput").value = ""; renderCategoryChips(); applyFiltersAndRender(); };
    const cartModal = document.getElementById("cartModal");
    document.getElementById("cartButton").onclick = () => { renderCartModal(); cartModal.style.display = "flex"; };
    document.getElementById("closeCartBtn").onclick = () => cartModal.style.display = "none";
    document.getElementById("checkoutBtn").onclick = () => checkoutViaFacebook();
    const suggestionModal = document.getElementById("suggestionModal");
    document.getElementById("suggestionBtn").onclick = () => suggestionModal.style.display = "flex";
    document.getElementById("closeSuggestionBtn").onclick = () => { suggestionModal.style.display = "none"; document.getElementById("suggestionText").value = ""; };
    document.getElementById("sendSuggestionBtn").onclick = () => sendSuggestionToFB();
    window.onclick = (e) => { if(e.target === cartModal) cartModal.style.display="none"; if(e.target === suggestionModal) suggestionModal.style.display="none"; if(e.target === document.getElementById("loginModal")) document.getElementById("loginModal").style.display="none"; };

    // Initialize
    window.onload = () => {
        loadCart();
        loadAnnouncement();
        listenToCatalog();
        updateGlobalVisitCounter();  // Initialize global counter
        if(isAuthenticated()) document.getElementById("adminPanel").style.display = "block";
        updateFirebaseStatusUI();
        auth.onAuthStateChanged(() => updateFirebaseStatusUI());
    };
</script>
</body>
</html>
